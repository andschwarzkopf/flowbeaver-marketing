<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Mockup — Branchenreport 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    /* Schachbrett nur zur Vorschau der Transparenz */
    background: repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 0 0 / 20px 20px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    perspective: 1000px;
    width: 440px;
    height: 640px;
    position: relative;
  }

  .book {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transform: rotateY(-25deg) rotateX(3deg);
  }

  /* === Buchdeckel (Vorderseite) === */
  .book-cover {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 0 3px 3px 0;
    overflow: hidden;
    transform: translateZ(20px);
  }

  .book-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* === Rückseite === */
  .book-back {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #f0ede8;
    border-radius: 0 3px 3px 0;
    transform: translateZ(-20px);
  }

  /* === Buchrücken (Spine) — deutlich dicker === */
  .book-spine {
    position: absolute;
    left: 0;
    top: 0;
    width: 40px;
    height: 100%;
    background: linear-gradient(to right, #142e4a, #1a3a5c, #1f4570);
    transform: rotateY(90deg) translateZ(0px) translateX(-20px);
    transform-origin: left center;
    border-radius: 3px 0 0 3px;
  }

  /* === Seitenkanten (Papier oben/unten) === */
  .book-pages-top {
    position: absolute;
    top: 0;
    left: 20px;
    width: calc(100%);
    height: 40px;
    background: repeating-linear-gradient(
      to right,
      #f5f0e8, #f5f0e8 1px,
      #ede8e0 1px, #ede8e0 2px
    );
    transform: rotateX(90deg);
    transform-origin: top center;
  }

  .book-pages-bottom {
    position: absolute;
    bottom: 0;
    left: 20px;
    width: calc(100%);
    height: 40px;
    background: repeating-linear-gradient(
      to right,
      #f5f0e8, #f5f0e8 1px,
      #ede8e0 1px, #ede8e0 2px
    );
    transform: rotateX(-90deg);
    transform-origin: bottom center;
  }

  /* === Seitenkante rechts (Schnittfläche) === */
  .book-pages-right {
    position: absolute;
    right: 0;
    top: 0;
    width: 40px;
    height: 100%;
    background: repeating-linear-gradient(
      to bottom,
      #f5f0e8, #f5f0e8 1px,
      #ede8e0 1px, #ede8e0 2px
    );
    transform: rotateY(90deg) translateZ(calc(440px - 20px));
    transform-origin: right center;
  }

  /* === Schatten — nur ausserhalb, unten rechts === */
  .book-shadow {
    position: absolute;
    bottom: -40px;
    left: 15%;
    width: 85%;
    height: 50px;
    background: radial-gradient(
      ellipse at 55% 40%,
      rgba(0, 0, 0, 0.18) 0%,
      rgba(0, 0, 0, 0.08) 40%,
      transparent 70%
    );
    filter: blur(12px);
    transform: skewX(-12deg);
    pointer-events: none;
    z-index: -1;
  }
</style>
</head>
<body>

<div class="scene">
  <div class="book">
    <!-- Vorderseite -->
    <div class="book-cover">
      <img src="Branchenreport 2026 KI in der Buchhaltung Flowbeaver.png" alt="Branchenreport 2026 — KI in der Buchhaltung">
    </div>

    <!-- Rückseite -->
    <div class="book-back"></div>

    <!-- Buchrücken -->
    <div class="book-spine"></div>

    <!-- Seitenkanten -->
    <div class="book-pages-top"></div>
    <div class="book-pages-bottom"></div>
    <div class="book-pages-right"></div>
  </div>

  <!-- Schatten unter dem Buch -->
  <div class="book-shadow"></div>
</div>

</body>
</html>
